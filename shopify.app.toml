# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a945c8b5a8d59b06fe8203e4bff9bb79"
name = "BitBabit:Variant Images"
application_url = "https://shopify-varient-images.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  # Required for Shopify App Store distribution
  # https://shopify.dev/docs/apps/build/compliance/privacy-law-compliance
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/app/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_files,write_files"

[auth]
redirect_urls = [
  "https://shopify-varient-images.onrender.com/auth/callback",
  "https://shopify-varient-images.onrender.com/auth/session-token"
]
